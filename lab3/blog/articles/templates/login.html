{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Вход</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-page">
    <div class="content">
        <h1>Вход на сайт</h1>

        <form method="POST">
            {% csrf_token %}

            <input
                type="text"
                name="username"
                placeholder="Логин"
                value="{{ form.username }}"
            >

            <input
                type="password"
                name="password"
                placeholder="Пароль"
            >

            <input type="submit" value="Войти">
        </form>

        <div class="form-errors">
            {{ form.errors }}
        </div>

        <p class="back-link"><a href="/">Все записи</a></p>
    </div>
</body>
</html>
