{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - создать статью</title>
    <link rel="stylesheet" href="{% static 'css/create_post.css' %}">
</head>
<body class="create-post-page">
    <div class="content">
        <h1>Написать статью</h1>

        <form method="POST">
            {% csrf_token %}

            <input
                type="text"
                name="title"
                placeholder="Название статьи"
                value="{{ form.title }}"
            >

            <textarea
                name="text"
                placeholder="Текст статьи"
            >{{ form.text }}</textarea>

            <input type="submit" value="Сохранить">
        </form>

        <div class="form-errors">
            {{ form.errors }}
        </div>

        <p class="back-link"><a href="/">Все записи</a></p>
    </div>
</body>
</html>
